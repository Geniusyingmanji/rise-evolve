# LLaMA-Factory-style SFT config stub.
# Run scripts/train/convert_sft.py first and point dataset registration to data/train_ready/v1/sft_train_lf.json.
model_name_or_path: Qwen/Qwen3-VL-8B-Instruct
stage: sft
do_train: true
finetuning_type: lora
template: qwen3_vl
dataset: risevolve_v1_sft
cutoff_len: 32768
learning_rate: 1.0e-5
num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 2
lr_scheduler_type: cosine
warmup_ratio: 0.02
bf16: true
flash_attn: auto
freeze_vision_tower: true
freeze_multi_modal_projector: true
loraplus_lr_ratio: 1.0
output_dir: outputs/train/sft_qwen3vl_lora_v1
logging_steps: 10
save_steps: 200
eval_steps: 200
save_total_limit: 3
