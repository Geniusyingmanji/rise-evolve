algorithm: grpo
model:
  init_from: outputs/train/sft_qwen3vl_lora_v1
data:
  prompts: data/train_ready/v1/rl_prompts.jsonl
rollout:
  rollouts_per_prompt: 4
  train_batch_size: 8
  temperature: 0.7
  top_p: 0.95
  max_tool_calls: 6
  max_response_tokens: 12000
  editor_backend: programmatic_or_mock
reward:
  backend: rise_critic
  service_url: http://127.0.0.1:8766/score_agent
  log_heads: true
optimization:
  lr: 5.0e-7
  kl_coef: 1.0e-3
  clip_low: 0.20
  clip_high: 0.28
  sft_replay_weight: 0.05
opd:
  enabled: false
